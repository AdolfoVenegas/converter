<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Bravo — Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="shortcut icon" href="./icon.png" type="image/png">
</head>

<body>
    <main role="main">
        <form id="formulario" enctype="multipart/form-data" method="POST" action="/convert">
            <div class="drop-zone" id="drop-zone">
                <label>Drop your images here or click to select</label>
                <input id="fotito" type="file" name="image" accept="image/*" multiple hidden />
            </div>


            <div class="botones">
                <button type="submit" class="primary">🔄 Convert</button>
                <button type="button" id="btn-clear" class="danger">🗑️ Delete Data</button>
            </div>
        </form>

        <div id="resultado" class="resultado" aria-live="polite"></div>
    </main>

</body>
<script src="app.js"></script>

</html>
